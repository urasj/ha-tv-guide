name: Build helper APK
on:
  push:
    paths:
      - 'helper-app/**'
      - '.github/workflows/build-helper.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Build debug APK
        working-directory: helper-app
        run: |
          gradle wrapper --gradle-version 8.7
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Stage APK
        run: cp helper-app/app/build/outputs/apk/debug/app-debug.apk tvguide-helper.apk
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: helper-latest
          name: TV Guide Helper (latest)
          files: tvguide-helper.apk
          fail_on_unmatched_files: true
