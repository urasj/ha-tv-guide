<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #e50914;
    --accent2: #f5a623;
    --card-w: 180px;
    --card-h: 270px;
    --radius: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; gap: 24px;
    padding: 0 32px;
    height: 60px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
    backdrop-filter: blur(4px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 2px;
    flex-shrink: 0;
  }
  .nav-actions {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px;
    border-radius: 4px;
    border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #ff0f1e; }
  .btn-ghost { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: rgba(255,255,255,0.14); }
  .btn-icon { padding: 7px 10px; font-size: 16px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── HERO ── */
  #hero {
    position: relative;
    height: 520px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  #hero-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center 20%;
    transition: opacity 0.6s;
  }
  #hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      to right, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.6) 50%, transparent 100%
    ),
    linear-gradient(to top, rgba(10,10,15,1) 0%, transparent 40%);
  }
  #hero-content {
    position: relative; z-index: 2;
    padding: 120px 48px 48px;
    max-width: 560px;
  }
  #hero-badge {
    display: inline-block;
    padding: 3px 10px;
    background: var(--accent);
    border-radius: 3px;
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  #hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px; line-height: 1;
    margin-bottom: 12px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  #hero-meta {
    display: flex; gap: 12px; align-items: center;
    font-size: 13px; color: var(--muted);
    margin-bottom: 14px;
  }
  #hero-meta span { display: flex; align-items: center; gap: 4px; }
  #hero-overview {
    font-size: 14px; line-height: 1.6; color: rgba(232,232,240,0.8);
    margin-bottom: 20px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  #hero-actions { display: flex; gap: 10px; }
  #hero-actions .btn { padding: 10px 22px; font-size: 14px; }

  /* ── MAIN ── */
  main { padding: 0 32px 160px; }

  /* ── SECTION ROWS ── */
  .section { margin-bottom: 40px; }
  .section-header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 1px; color: var(--text);
  }
  .section-count {
    font-size: 12px; color: var(--muted);
    background: var(--surface2); padding: 2px 8px; border-radius: 20px;
  }

  .row-scroll {
    display: flex; gap: 12px;
    overflow-x: auto;
    overflow-y: visible;
    padding-bottom: 8px;
    scroll-snap-type: x mandatory;
    -ms-overflow-style: none; scrollbar-width: none;
    touch-action: pan-x;
    cursor: grab;
    user-select: none;
    -webkit-overflow-scrolling: touch;
  }
  .row-scroll:active { cursor: grabbing; }
  .row-scroll::-webkit-scrollbar { display: none; }

  /* ── SHOW CARD ── */
  .show-card {
    flex-shrink: 0;
    width: var(--card-w); height: var(--card-h);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    scroll-snap-align: start;
    transition: transform 0.2s, box-shadow 0.2s;
    background: var(--surface2);
  }
  .show-card:hover {
    transform: scale(1.06);
    box-shadow: 0 12px 40px rgba(0,0,0,0.7);
    z-index: 2;
  }
  .show-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }
  .show-card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 55%);
    opacity: 0;
    transition: opacity 0.2s;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 14px;
    gap: 6px;
  }
  .show-card:hover .show-card-overlay { opacity: 1; }
  .card-title {
    font-size: 13px; font-weight: 600; line-height: 1.3;
  }
  .card-meta {
    font-size: 11px; color: var(--muted);
    display: flex; gap: 8px; align-items: center;
  }
  .card-svc {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px;
    background: rgba(255,255,255,0.12);
    border-radius: 3px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .card-next-ep {
    font-size: 10px; color: var(--accent2);
    font-weight: 500;
  }
  .card-unwatched-badge {
    position: absolute; top: 8px; right: 8px;
    background: var(--accent);
    color: #fff; font-size: 10px; font-weight: 700;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .card-no-img {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; padding: 16px; text-align: center;
    background: var(--surface2);
  }
  .card-no-img-icon { font-size: 40px; opacity: 0.3; }
  .card-no-img-title { font-size: 13px; font-weight: 500; opacity: 0.7; }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: 10px;
    width: 100%; max-width: 860px;
    overflow: hidden;
    transform: translateY(20px);
    transition: transform 0.25s;
    border: 1px solid var(--border);
  }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-hero {
    position: relative; height: 320px; overflow: hidden;
  }
  .modal-hero img {
    width: 100%; height: 100%; object-fit: cover; object-position: center 20%;
  }
  .modal-hero::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to top, var(--surface) 0%, transparent 60%);
  }
  .modal-hero-info {
    position: absolute; bottom: 24px; left: 28px; right: 28px;
    z-index: 2;
    display: flex; align-items: flex-end; gap: 20px;
  }
  .modal-poster {
    width: 80px; height: 120px; border-radius: 4px;
    object-fit: cover; flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .modal-hero-text { flex: 1; }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; line-height: 1;
    margin-bottom: 6px;
  }
  .modal-meta {
    display: flex; gap: 12px; flex-wrap: wrap;
    font-size: 13px; color: var(--muted);
    margin-bottom: 10px;
  }
  .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .modal-close {
    position: absolute; top: 16px; right: 16px; z-index: 3;
    width: 34px; height: 34px;
    background: rgba(0,0,0,0.6);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .modal-close:hover { background: rgba(255,255,255,0.15); }

  .modal-body { padding: 24px 28px 28px; }
  .modal-overview {
    font-size: 14px; line-height: 1.7; color: rgba(232,232,240,0.75);
    margin-bottom: 20px;
  }

  /* Season tabs */
  .season-tabs {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .season-tab {
    padding: 5px 14px; border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; cursor: pointer;
    transition: all 0.15s;
  }
  .season-tab.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff;
  }
  .season-tab:hover:not(.active) { border-color: rgba(255,255,255,0.2); color: var(--text); }

  /* Service override */
  .service-override {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 20px; align-items: center;
  }
  .service-override-label { font-size: 12px; color: var(--muted); margin-right: 4px; }
  .svc-btn {
    padding: 4px 12px; border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    cursor: pointer; transition: all 0.15s;
  }
  .svc-btn.active { background: var(--accent2); border-color: var(--accent2); color: #111; }
  .svc-btn:hover:not(.active) { border-color: rgba(255,255,255,0.25); color: var(--text); }

  /* Episode list */
  .ep-list { display: flex; flex-direction: column; gap: 2px; }
  .ep-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 5px;
    transition: background 0.15s;
    cursor: default;
  }
  .ep-row:hover { background: var(--surface2); }
  .ep-row.watched { opacity: 0.45; }
  .ep-num {
    font-size: 12px; color: var(--muted); font-weight: 500;
    min-width: 28px; text-align: right;
  }
  .ep-info { flex: 1; min-width: 0; }
  .ep-name {
    font-size: 14px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ep-air {
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }
  .ep-tick {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .ep-tick.on { background: #1db954; border-color: #1db954; color: #fff; }
  .ep-watch {
    padding: 5px 12px; border-radius: 3px;
    background: var(--accent); color: #fff;
    border: none; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; flex-shrink: 0;
  }
  .ep-watch:hover { background: #ff0f1e; }

  /* ── SCAN MODAL ── */
  .scan-modal {
    position: fixed; bottom: 24px; right: 24px; z-index: 300;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px; color: var(--text);
    min-width: 220px;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    display: flex; align-items: center; gap: 10px;
  }
  .scan-modal.show { transform: translateY(0); opacity: 1; }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  #toast-container {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 500; display: flex; flex-direction: column; gap: 8px; align-items: center;
    pointer-events: none;
  }
  .toast {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 6px;
    font-size: 13px; font-weight: 500;
    animation: toastIn 0.2s ease, toastOut 0.3s ease 2.5s forwards;
  }
  .toast.error { border-color: var(--accent); color: #ff6b6b; }
  @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  @keyframes toastOut { to { opacity:0; transform:translateY(-10px); } }

  /* ── HANDOFF OVERLAY ── */
  .handoff-overlay {
    position: fixed; inset: 0; z-index: 450;
    background: rgba(0,0,0,0.92);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.3s;
  }
  .handoff-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 36px;
    text-align: center;
    max-width: 480px; width: 90%;
  }
  .handoff-app-icon { font-size: 48px; margin-bottom: 12px; }
  .handoff-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 1px; margin-bottom: 8px;
  }
  .handoff-sub {
    font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 24px;
  }
  .handoff-remote {
    display: grid;
    grid-template-areas:
      ". up ."
      "left ok right"
      ". down ."
      "back home .";
    gap: 8px; justify-content: center;
    margin-bottom: 24px;
  }
  .hr-up    { grid-area: up; }
  .hr-down  { grid-area: down; }
  .hr-left  { grid-area: left; }
  .hr-right { grid-area: right; }
  .hr-ok    { grid-area: ok; }
  .hr-back  { grid-area: back; }
  .hr-home  { grid-area: home; }
  .handoff-remote .remote-btn {
    width: 48px; height: 48px; font-size: 18px;
  }
  .hr-ok { background: var(--surface2); width: 48px; height: 48px; }
  .handoff-ready {
    width: 100%;
    padding: 14px;
    background: #1db954;
    border: none; border-radius: 6px;
    color: #fff; font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 1px;
    cursor: pointer; transition: all 0.15s;
    margin-bottom: 10px;
  }
  .handoff-ready:hover { background: #1ed760; transform: scale(1.02); }
  .handoff-cancel {
    background: none; border: none; color: var(--muted);
    font-size: 13px; cursor: pointer;
  }
  .handoff-cancel:hover { color: var(--text); }
  .handoff-pulse {
    display: inline-block;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); margin-right: 8px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── HANDOFF OVERLAY ── */
  .handoff-overlay {
    position: fixed; inset: 0; z-index: 450;
    background: rgba(0,0,0,0.92);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.3s;
  }
  .handoff-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 36px;
    text-align: center;
    max-width: 480px; width: 90%;
  }
  .handoff-app-icon { font-size: 48px; margin-bottom: 12px; }
  .handoff-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 1px; margin-bottom: 8px;
  }
  .handoff-sub {
    font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 24px;
  }
  .handoff-remote {
    display: grid;
    grid-template-areas: ". up ." "left ok right" ". down ." "back home .";
    gap: 8px; justify-content: center; margin-bottom: 24px;
  }
  .hr-up { grid-area: up; } .hr-down { grid-area: down; }
  .hr-left { grid-area: left; } .hr-right { grid-area: right; }
  .hr-ok { grid-area: ok; } .hr-back { grid-area: back; } .hr-home { grid-area: home; }
  .handoff-remote .remote-btn { width: 48px; height: 48px; font-size: 18px; }
  .handoff-ready {
    width: 100%; padding: 14px;
    background: #1db954; border: none; border-radius: 6px;
    color: #fff; font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 1px;
    cursor: pointer; transition: all 0.15s; margin-bottom: 10px;
  }
  .handoff-ready:hover { background: #1ed760; }
  .handoff-ready:disabled { opacity: 0.6; cursor: not-allowed; }
  .handoff-cancel { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; }
  .handoff-cancel:hover { color: var(--text); }
  .handoff-pulse {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); margin-right: 6px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.7); } }

  /* ── PROFILE OVERLAY ── */
  .prof-overlay {
    position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,0.9);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } }
  .prof-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px 40px;
    text-align: center;
    max-width: 420px; width: 90%;
  }
  .prof-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 1px; margin-bottom: 4px;
  }
  .prof-app { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .prof-grid {
    display: flex; flex-wrap: wrap; gap: 14px;
    justify-content: center; margin-bottom: 20px;
  }
  .prof-btn {
    width: 88px; height: 88px;
    border-radius: 6px; border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text); cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; transition: all 0.15s;
  }
  .prof-btn:hover { border-color: var(--accent); background: rgba(229,9,20,0.1); }
  .prof-avatar { font-size: 30px; }
  .prof-cancel { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; }
  .prof-cancel:hover { color: var(--text); }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px; color: var(--muted); text-align: center; padding: 40px;
  }
  .empty-icon { font-size: 64px; opacity: 0.3; }
  .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; color: var(--text); }
  .empty-sub { font-size: 14px; max-width: 300px; line-height: 1.6; }

  /* ── LOADING ── */
  .loading-row {
    display: flex; gap: 12px; overflow: hidden; padding-bottom: 8px;
  }
  .skeleton-card {
    flex-shrink: 0; width: var(--card-w); height: var(--card-h);
    border-radius: var(--radius);
    background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── REMOTE BAR ── */
  /* ── Responsive ── */
  * { box-sizing: border-box; }
  :root {
    --card-w: clamp(130px, 15vw, 180px);
    --card-h: clamp(195px, 22.5vw, 270px);
  }
  @media (max-width: 600px) {
    nav { padding: 0 12px; }
    main { padding: 0 12px 140px; }
    #hero { height: 300px; }
    #hero-content { padding: 60px 20px 20px; }
    #hero-title { font-size: 32px; }
    .modal { margin: 0; border-radius: 0; min-height: 100vh; }
    .modal-hero { height: 200px; }
    .modal-body { padding: 16px; }
    .modal-title { font-size: 24px; }
  }
  @media (min-width: 601px) and (max-width: 1024px) {
    main { padding: 0 20px 130px; }
    #hero-content { padding: 80px 28px 28px; }
  }

  /* ── Remote bar ── */
  .remote-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
    background: rgba(13,13,20,0.97); backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    padding: 8px 16px 10px;
    display: flex; flex-direction: column; gap: 6px;

  .remote-row {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    flex-wrap: wrap;
  }
  .remote-btn {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2); color: var(--text);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .remote-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.25); }
  .remote-btn:active { transform: scale(0.92); }
  .remote-btn.ok-btn {
    width: 54px; height: 54px; font-size: 12px; font-weight: 700;
    background: var(--surface); border-color: rgba(255,255,255,0.25);
  }
  .remote-btn.active-btn { background: var(--accent2); border-color: var(--accent2); color: #111; }
  .remote-sep { width: 1px; height: 28px; background: var(--border); margin: 0 2px; }
  .remote-label {
    font-size: 9px; font-weight: 600; letter-spacing: 0.8px;

  .sonos-vol {

  }
  .vol-bar-wrap {

    height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden;
  }
  .vol-bar { height: 100%; background: var(--text); border-radius: 2px; transition: width 0.2s; }
</style>
</head>

<!-- Show modal -->
<div class="modal-backdrop" id="show-modal" onclick="maybeCloseModal(event)">

<!-- Scan toast -->
<div class="scan-modal" id="scan-toast">
  <span class="spin">⟳</span>
  <span id="scan-msg">Scanning…</span>
</div>

<div id="toast-container"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
var SVCS = {
  netflix:'Netflix', hulu:'Hulu', disney:'Disney+', max:'Max',
  peacock:'Peacock', discovery:'Discovery+', prime:'Prime Video',
  apple:'Apple TV+', paramount:'Paramount+', plex:'Plex', tubi:'Tubi',
  pluto:'Pluto TV', youtube:'YouTube'
};
var SVC_COLORS = {
  netflix:'#e50914', hulu:'#1ce783', disney:'#113ccf', max:'#002be7',
  peacock:'#ffd60a', discovery:'#0459ff', prime:'#00a8e1',
  apple:'#a2aaad', paramount:'#0064ff', plex:'#e5a00d',
  tubi:'#fa4500', pluto:'#fff', youtube:'#ff0000'
};

// ── State ──────────────────────────────────────────────────────────────────
var appData = { shows:[], watched:{}, services:{}, deep_links:{}, profiles:{} };
var allShows = [];
var currentShowId = null;
var currentSeason = null;
var _profCb = null;

// ── API helpers ────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const r = await fetch(path, {
    method, headers:{'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json().catch(()=>({}));
}
const get = p => api('GET',p);
const post = (p,b) => api('POST',p,b);
const del = p => api('DELETE',p);

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Load ───────────────────────────────────────────────────────────────────
async function loadShows() {
  var refreshBtn2 = document.getElementById('btn-refresh');
  if (refreshBtn2) refreshBtn2.textContent = '⟳';
  try {
    const [status, shows] = await Promise.all([
      get('api/status'),
      get('api/shows')
    ]);
    // status.services is the SVCS labels dict - store separately
    var SVCS_LABELS = status.services || {};
    // Build per-show service map from shows array
    var showServices = {};
    var showDeepLinks = {};
    shows.forEach(s => {
      if (s.service) showServices[String(s.id)] = s.service;
      if (s.deep_link) showDeepLinks[String(s.id)] = s.deep_link;
    });
    // profiles come from status.profiles
    appData = { watched:{}, services: showServices, deep_links: showDeepLinks, profiles:{}, ...status, shows };
    // Restore per-show data (status.services overwrites with labels dict)
    appData.services = showServices;
    appData.deep_links = showDeepLinks;
    allShows = shows;
    render();
  initDragScroll();
  } catch(e) {
    toast('Failed to load shows: ' + e.message, 'error');
    console.error('loadShows error:', e);
  }
  const refreshBtn = document.getElementById('btn-refresh');
  if (refreshBtn) refreshBtn.textContent = '↻';
}

// ── Render ─────────────────────────────────────────────────────────────────
function getPoster(show) {
  const images = show.images || [];
  const poster = images.find(i=>i.coverType==='poster');
  return poster?.remoteUrl || poster?.url || null;
}
function getFanart(show) {
  const images = show.images || [];
  const fanart = images.find(i=>i.coverType==='fanart') || images.find(i=>i.coverType==='banner');
  return fanart?.remoteUrl || fanart?.url || null;
}
function getSvc(sid) {
  return appData.services?.[String(sid)] || null;
}
function getUnwatched(show) {
  const watched = appData.watched?.[show.id] || [];
  const eps = show.episodes || [];
  return eps.filter(e => e.airDateUtc && new Date(e.airDateUtc) <= new Date() && !watched.includes(e.id));
}

function render() {
  const skeletonRow = document.getElementById('skeleton-row');
  if (skeletonRow) skeletonRow.style.display = 'none';
  const main = document.getElementById('main-content');

  if (!allShows.length) {
    main.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📺</div>
      <div class="empty-title">No Shows Yet</div>
      <div class="empty-sub">Connect Sonarr to start tracking your shows.</div>
    </div>`;
    return;
  }

  // Split into groups
  const withService = allShows.filter(s => getSvc(s.id));
  const noService = allShows.filter(s => !getSvc(s.id));
  const continuing = allShows.filter(s => s.status === 'continuing');
  const ended = allShows.filter(s => s.status === 'ended');

  // Hero: pick first continuing show with fanart
  const heroShow = continuing.find(s=>getFanart(s)) || allShows.find(s=>getFanart(s)) || allShows[0];
  if (heroShow) renderHero(heroShow);

  main.innerHTML = '';

  // Sections
  const sections = [
    { title: 'Continue Watching', shows: continuing },
    { title: 'All Shows', shows: allShows },
    { title: 'Ended', shows: ended },
  ].filter(s => s.shows.length > 0);

  // Dedupe: only show each show in first matching section
  const seen = new Set();
  for (const sec of sections) {
    const unique = sec.shows.filter(s => !seen.has(s.id));
    unique.forEach(s => seen.add(s.id));
    if (!unique.length) continue;
    main.appendChild(buildSection(sec.title, unique));
  }
}

function renderHero(show) {
  const fanart = getFanart(show) || getPoster(show);
  const svc = getSvc(show.id);
  document.getElementById('hero-bg').style.backgroundImage = fanart ? `url(${fanart})` : 'none';
  document.getElementById('hero-title').textContent = show.title;
  document.getElementById('hero-overview').textContent = show.overview || '';
  
  const unwatched = getUnwatched(show);
  const meta = document.getElementById('hero-meta');
  meta.innerHTML = `
    <span>${show.network || ''}</span>
    ${show.year ? `<span>· ${show.year}</span>` : ''}
    ${show.status ? `<span>· ${show.status}</span>` : ''}
    ${unwatched.length ? `<span style="color:var(--accent2)">· ${unwatched.length} unwatched</span>` : ''}
  `;

  const actions = document.getElementById('hero-actions');
  actions.innerHTML = `
    <button class="btn btn-primary" onclick="openModal(${show.id})">▶ View Episodes</button>
    ${svc ? `<button class="btn btn-ghost" onclick="launchShow(${show.id},'${svc}')">📺 Watch on ${SVCS[svc]||svc}</button>` : ''}
  `;
}

function buildSection(title, shows) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `
    <div class="section-header">
      <div class="section-title">${title}</div>
      <div class="section-count">${shows.length}</div>
    </div>
    <div class="row-scroll" id="row-${title.replace(/\s+/g,'-')}"></div>
  `;
  const row = sec.querySelector('.row-scroll');
  shows.forEach(show => row.appendChild(buildCard(show)));
  return sec;
}

function buildCard(show) {
  const card = document.createElement('div');
  card.className = 'show-card';
  card.onclick = () => openModal(show.id);

  const poster = getPoster(show);
  const svc = getSvc(show.id);
  const unwatched = getUnwatched(show);
  const svcColor = svc ? (SVC_COLORS[svc] || '#fff') : null;

  if (poster) {
    card.innerHTML = `<img src="${poster}" alt="${show.title}" loading="lazy">`;
  } else {
    card.innerHTML = `<div class="card-no-img">
      <div class="card-no-img-icon">📺</div>
      <div class="card-no-img-title">${show.title}</div>
    </div>`;
  }

  if (unwatched.length > 0) {
    card.innerHTML += `<div class="card-unwatched-badge">${unwatched.length > 9 ? '9+' : unwatched.length}</div>`;
  }

  card.innerHTML += `<div class="show-card-overlay">
    <div class="card-title">${show.title}</div>
    <div class="card-meta">
      ${show.network ? `<span>${show.network}</span>` : ''}
      ${svc ? `<span class="card-svc" style="color:${svcColor}">${SVCS[svc]||svc}</span>` : ''}
    </div>
    ${show.nextAiring ? `<div class="card-next-ep">Next: ${new Date(show.nextAiring).toLocaleDateString()}</div>` : ''}
  </div>`;

  return card;
}

// ── Modal ──────────────────────────────────────────────────────────────────
async function openModal(showId) {
  currentShowId = showId;
  const show = allShows.find(s=>s.id===showId);
  if (!show) return;

  document.getElementById('show-modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  const fanart = getFanart(show);
  const poster = getPoster(show);
  const svc = getSvc(showId);

  document.getElementById('modal-fanart').src = fanart || poster || '';
  document.getElementById('modal-poster').src = poster || '';
  document.getElementById('modal-poster').style.display = poster ? 'block' : 'none';
  document.getElementById('modal-title').textContent = show.title;
  document.getElementById('modal-overview').textContent = show.overview || '';

  // Meta
  const meta = document.getElementById('modal-meta');
  meta.innerHTML = [
    show.network, show.year, show.status,
    show.genres?.join(', ')
  ].filter(Boolean).map(m=>`<span>${m}</span>`).join('');

  // Actions
  const actions = document.getElementById('modal-actions');
  actions.innerHTML = svc
    ? `<button class="btn btn-primary" onclick="launchShow(${showId},'${svc}')">▶ Watch on ${SVCS[svc]||svc}</button>
       <button class="btn btn-ghost" onclick="scanShow(${showId})">🔍 Scan</button>`
    : `<button class="btn btn-ghost" onclick="scanShow(${showId})">🔍 Find Streaming Service</button>`;

  // Service override
  renderServiceButtons(showId);

  // Load episodes
  try {
    const eps = await get(`api/shows/${showId}/episodes`);
    show.episodes = eps;
    renderSeasons(show);
  } catch {
    document.getElementById('ep-list').innerHTML = '<div style="color:var(--muted);font-size:13px;padding:10px 0">No episode data available</div>';
  }
}

function renderServiceButtons(showId) {
  const svc = getSvc(showId);
  const override = document.getElementById('service-override');
  override.innerHTML = `<span class="service-override-label">Service:</span>` +
    Object.entries(SVCS).map(([k,v]) =>
      `<button class="svc-btn${svc===k?' active':''}" onclick="setService(${showId},'${k}',this)">${v}</button>`
    ).join('') +
    (svc ? `<button class="svc-btn" onclick="setService(${showId},'',this)">✕ Clear</button>` : '');
}

function renderSeasons(show) {
  const eps = show.episodes || [];
  const seasons = [...new Set(eps.map(e=>e.seasonNumber))].filter(s=>s>0).sort((a,b)=>a-b);
  if (!seasons.length) {
    document.getElementById('season-tabs').innerHTML = '';
    document.getElementById('ep-list').innerHTML = '<div style="color:var(--muted);font-size:13px;padding:10px 0">No episodes found</div>';
    return;
  }

  // Default to latest season
  if (!currentSeason || !seasons.includes(currentSeason)) {
    currentSeason = seasons[seasons.length-1];
  }

  const tabs = document.getElementById('season-tabs');
  tabs.innerHTML = seasons.map(s =>
    `<button class="season-tab${s===currentSeason?' active':''}" onclick="selectSeason(${show.id},${s})">
      Season ${s}
    </button>`
  ).join('');

  renderEpisodes(show, currentSeason);
}

function selectSeason(showId, season) {
  currentSeason = season;
  const show = allShows.find(s=>s.id===showId);
  document.querySelectorAll('.season-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim() === `Season ${season}`);
  });
  renderEpisodes(show, season);
}

function renderEpisodes(show, season) {
  const eps = (show.episodes||[]).filter(e=>e.seasonNumber===season).sort((a,b)=>a.episodeNumber-b.episodeNumber);
  const watched = appData.watched?.[show.id] || [];
  const svc = getSvc(show.id);
  const list = document.getElementById('ep-list');

  if (!eps.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:10px 0">No episodes in this season</div>';
    return;
  }

  list.innerHTML = eps.map(ep => {
    const isWatched = watched.includes(ep.id);
    const airDate = ep.airDateUtc ? new Date(ep.airDateUtc).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'TBA';
    const hasFired = ep.airDateUtc && new Date(ep.airDateUtc) <= new Date();
    return `<div class="ep-row${isWatched?' watched':''}" id="ep-${ep.id}">
      <div class="ep-num">${ep.episodeNumber}</div>
      <div class="ep-info">
        <div class="ep-name">${ep.title || `Episode ${ep.episodeNumber}`}</div>
        <div class="ep-air">${airDate}</div>
      </div>
      ${hasFired ? `<button class="ep-tick${isWatched?' on':''}" onclick="toggleWatched(${show.id},${ep.id},${isWatched})" title="${isWatched?'Mark unwatched':'Mark watched'}">✓</button>` : ''}
      ${svc && hasFired ? `<button class="ep-watch" onclick="launchShow(${show.id},'${svc}',${ep.id})">▶ Watch</button>` : ''}
    </div>`;
  }).join('');
}

function closeModal() {
  document.getElementById('show-modal').classList.remove('open');
  document.body.style.overflow = '';
  currentShowId = null;
  currentSeason = null;
}

function maybeCloseModal(e) {
  if (e.target === document.getElementById('show-modal')) closeModal();
}

// ── Service override ───────────────────────────────────────────────────────
async function setService(showId, svc, btn) {
  try {
    await post(`api/shows/${showId}/service`, { service: svc });
    if (!appData.services) appData.services = {};
    appData.services[String(showId)] = svc || null;
    var showObj = allShows.find(s => s.id === showId);
    if (showObj) showObj.service = svc || null;
    renderServiceButtons(showId);
    // Re-render actions
    const show = allShows.find(s=>s.id===showId);
    const actions = document.getElementById('modal-actions');
    actions.innerHTML = svc
      ? `<button class="btn btn-primary" onclick="launchShow(${showId},'${svc}')">▶ Watch on ${SVCS[svc]||svc}</button>
         <button class="btn btn-ghost" onclick="scanShow(${showId})">🔍 Scan</button>`
      : `<button class="btn btn-ghost" onclick="scanShow(${showId})">🔍 Find Streaming Service</button>`;
    // Re-render season episodes to show/hide watch buttons
    if (show?.episodes) renderEpisodes(show, currentSeason);
    toast(`Service set to ${SVCS[svc]||svc||'none'}`);
    // Auto-fetch deep link for the manually chosen service
    // Pass forceSvc so TMDB result doesn't overwrite the manual choice
    if (svc) {
      const show2 = allShows.find(s => s.id === showId);
      if (show2?.tvdbId) {
        if (appData.deep_links) delete appData.deep_links[String(showId)];
        if (show2) show2.deep_link = null;
        scanShow(showId, svc);
      }
    }
  } catch(e) { toast('Failed to set service','error'); }
}

// ── Watched ────────────────────────────────────────────────────────────────
async function toggleWatched(sid, epId, isWatched) {
  if (isWatched) {
    appData.watched[sid] = (appData.watched[sid]||[]).filter(e=>e!==epId);
    await del(`api/shows/${sid}/watched/${epId}`);
  } else {
    if (!appData.watched[sid]) appData.watched[sid] = [];
    appData.watched[sid].push(epId);
    await post(`api/shows/${sid}/watched/${epId}`, {});
  }
  const row = document.getElementById(`ep-${epId}`);
  if (row) {
    row.classList.toggle('watched', !isWatched);
    const btn = row.querySelector('.ep-tick');
    if (btn) { btn.textContent='✓'; btn.classList.toggle('on', !isWatched); }
  }
}

// ── Launch ─────────────────────────────────────────────────────────────────
async function launchShow(sid, svc, epId) {
  // Step 1: Launch the app on Fire TV (force-stop + fresh start, no profile automation)
  toast(`🔥 Launching ${SVCS[svc]||svc}…`);
  try {
    await post('api/firetv/launch', { service: svc, profileIndex: -1, showId: sid });
  } catch(e) {
    toast('Launch failed: ' + e.message, 'error');
    return;
  }
  // Step 2: Show handoff overlay - user handles profile/PIN, then clicks Ready
  showHandoffOverlay(svc, sid);
}

function showHandoffOverlay(svc, showId) {
  const svcName = SVCS[svc] || svc;
  const el = document.createElement('div');
  el.className = 'handoff-overlay';
  el.id = 'handoff-overlay';
  el.innerHTML = `
    <div class="handoff-box">
      <div class="handoff-app-icon">📺</div>
      <div class="handoff-title">${svcName} is opening</div>
      <div class="handoff-sub">
        <span class="handoff-pulse"></span>
        Select your profile, enter your PIN if needed,<br>
        then wait for the home screen to load.<br>
        <strong>Click Ready</strong> when you see the home screen.
      </div>
      <div class="handoff-remote">
        <button class="remote-btn hr-up" onclick="remote('KEYCODE_DPAD_UP')">▲</button>
        <button class="remote-btn hr-left" onclick="remote('KEYCODE_DPAD_LEFT')">◀</button>
        <button class="remote-btn hr-ok" onclick="remote('KEYCODE_DPAD_CENTER')">OK</button>
        <button class="remote-btn hr-right" onclick="remote('KEYCODE_DPAD_RIGHT')">▶</button>
        <button class="remote-btn hr-down" onclick="remote('KEYCODE_DPAD_DOWN')">▼</button>
        <button class="remote-btn hr-back" onclick="remote('KEYCODE_BACK')">↩</button>
        <button class="remote-btn hr-home" onclick="remote('KEYCODE_HOME')">⌂</button>
      </div>
      <button class="handoff-ready" onclick="handoffReady('${svc}', ${showId})">
        ✓ I'm Ready — Go to Show
      </button>
      <button class="handoff-cancel" onclick="document.getElementById('handoff-overlay').remove()">
        Cancel
      </button>
    </div>`;
  document.body.appendChild(el);
}

async function handoffReady(svc, showId) {
  const overlay = document.getElementById('handoff-overlay');
  if (overlay) {
    overlay.querySelector('.handoff-ready').textContent = '⟳ Navigating to show…';
    overlay.querySelector('.handoff-ready').disabled = true;
  }
  try {
    const res = await post('api/firetv/deeplink', { service: svc, showId });
    toast(`✓ Opening show on ${SVCS[svc]||svc}`);
  } catch(e) {
    toast('Navigation failed: ' + e.message, 'error');
  }
  if (overlay) overlay.remove();
  closeModal();
}

async function doLaunch(svc, profileIndex, showId) {
  toast(`🔥 Launching ${SVCS[svc]||svc}…`);
  try {
    const res = await post('api/firetv/launch', { service:svc, profileIndex, showId });
    toast(`✓ ${res.deep_link ? 'Opening show on' : 'Launched'} ${SVCS[svc]||svc}`);
    closeModal();
  } catch(e) { toast('Launch failed: '+e.message,'error'); }
}

// ── Profile picker ─────────────────────────────────────────────────────────
function showProfilePicker(svc, onSelect) {
  _profCb = onSelect;
  const profiles = appData.profiles?.[svc] || [];
  const avatars = ['🧑','👧','🧔','👩','👦','🧓'];
  const el = document.createElement('div');
  el.className = 'prof-overlay';
  el.id = 'prof-overlay';
  el.innerHTML = `
    <div class="prof-box">
      <div class="prof-title">Who's watching?</div>
      <div class="prof-app">${SVCS[svc]||svc}</div>
      <div class="prof-grid">
        ${profiles.map((p,i)=>`
          <button class="prof-btn" onclick="selectProfile(${i})">
            <span class="prof-avatar">${avatars[i%avatars.length]}</span>
            <span>${p}</span>
          </button>`).join('')}
      </div>
      <button class="prof-cancel" onclick="document.getElementById('prof-overlay').remove()">Cancel</button>
    </div>`;
  document.body.appendChild(el);
}

function selectProfile(i) {
  document.getElementById('prof-overlay')?.remove();
  if (_profCb) { _profCb(i); _profCb = null; }
}

// ── Scan ───────────────────────────────────────────────────────────────────
async function scanShow(showId, forceSvc) {
  // forceSvc: when set, keep this service regardless of TMDB result (used after manual override)
  const scanToast = document.getElementById('scan-toast');
  const show = allShows.find(s=>s.id===showId);
  document.getElementById('scan-msg').textContent = `Getting link for ${show?.title||'show'}…`;
  scanToast.classList.add('show');
  try {
    const tvdbId = show?.tvdbId;
    const title = encodeURIComponent(show?.title || '');
    if (!tvdbId) { toast('No TVDB ID for this show', 'error'); scanToast.classList.remove('show'); return; }
    const res = await get(`api/shows/${showId}/scan-service?tvdb_id=${tvdbId}&title=${title}`);
    // If forceSvc is set, use that service — don't let TMDB overwrite the manual choice
    const svcToUse = forceSvc || res.service;
    if (svcToUse) {
      if (!appData.services) appData.services = {};
      // Only update service if not forcing (auto-scan) or if forcing and matches TMDB
      if (!forceSvc) {
        appData.services[String(showId)] = svcToUse;
        var showObj2 = allShows.find(s => s.id === showId);
        if (showObj2) showObj2.service = svcToUse;
      }
      // Build deep link for the correct service
      var deepLink = res.deep_link;
      // If TMDB found a different service, we still want a deep link for forceSvc
      if (forceSvc && res.service !== forceSvc) {
        // Build a search-based deep link for the manually chosen service
        const searchLinks = {
          netflix: `https://www.netflix.com/search?q=${title}`,
          hulu: `https://www.hulu.com/search?q=${title}`,
          disney: `https://www.disneyplus.com/search/${title}`,
          max: `https://play.max.com/search/result?q=${title}`,
          peacock: `https://www.peacocktv.com/search?q=${title}`,
          discovery: `https://play.discoveryplus.com/show/${title.toLowerCase().replace(/%20/g,'-')}`,
          prime: `https://www.amazon.com/s?k=${title}&i=prime-instant-video`,
          paramount: `https://www.paramountplus.com/shows/${title.toLowerCase().replace(/%20/g,'-')}/`,
          apple: `https://tv.apple.com/search?term=${title}`,
        };
        deepLink = searchLinks[forceSvc] || null;
        // Save the forced deep link to backend
        if (deepLink) {
          await post(`api/shows/${showId}/service`, { service: forceSvc, deep_link: deepLink });
        }
      }
      if (deepLink) {
        if (!appData.deep_links) appData.deep_links = {};
        appData.deep_links[String(showId)] = deepLink;
        var showObj3 = allShows.find(s => s.id === showId);
        if (showObj3) showObj3.deep_link = deepLink;
      }
      const displaySvc = forceSvc || svcToUse;
      toast(`✓ ${forceSvc ? 'Link ready for' : 'Found on'} ${SVCS[displaySvc]||displaySvc}${deepLink ? ' ▶' : ''}`);
      if (currentShowId === showId) {
        renderServiceButtons(showId);
        const showNow = allShows.find(s=>s.id===showId);
        if (showNow?.episodes) renderEpisodes(showNow, currentSeason);
        document.getElementById('modal-actions').innerHTML =
          `<button class="btn btn-primary" onclick="launchShow(${showId},'${displaySvc}')">▶ Watch on ${SVCS[displaySvc]||displaySvc}</button>
           <button class="btn btn-ghost" onclick="scanShow(${showId})">🔍 Scan</button>`;
      }
    } else {
      toast('Not found on any streaming service', 'error');
    }
  } catch(e) { toast('Scan failed: ' + e.message, 'error'); }
  scanToast.classList.remove('show');
}

async function scanAll() {
  const btn = document.getElementById('btn-scan-all');
  btn.disabled = true;
  const scanToast = document.getElementById('scan-toast');
  document.getElementById('scan-msg').textContent = 'Refreshing shows…';
  scanToast.classList.add('show');
  try {
    // Always fetch fresh show list from Sonarr first to pick up newly added shows
    const freshShows = await get('api/shows');
    allShows = freshShows;
    document.getElementById('scan-msg').textContent = `Scanning ${freshShows.length} shows…`;
    const res = await post('api/scan-all', { shows: freshShows.map(s => ({id:s.id, tvdbId:s.tvdbId, title:s.title})) });
    if (res.results) Object.assign(appData.services, res.results);
    toast(`✓ Found streaming service for ${res.found||0} of ${res.scanned||0} shows`);
    await loadShows();
  } catch(e) { toast('Scan failed: ' + e.message, 'error'); }
  scanToast.classList.remove('show');
  btn.disabled = false;
}

// ── Fire TV Remote ──────────────────────────────────────────────────────────
async function remote(key) {
  try { await post('api/firetv/command', { command: key }); }
  catch(e) { toast('Remote error','error'); }
}

// ── Sonos ────────────────────────────────────────────────────────────────────
var sonosState = { volume: 0.36, muted: false, speech: false, night: false };

async function sonosLoadState() {
  try {
    const s = await get('api/sonos/state');
    sonosState = { volume: s.volume||0, muted: s.muted||false, speech: s.speech_enhancement||false, night: s.night_mode||false };
    updateSonosUI();
  } catch(e) {}
}

function updateSonosUI() {
  const bar = document.getElementById('vol-bar');
  if (bar) bar.style.width = Math.round(sonosState.volume * 100) + '%';
  const btnMute = document.getElementById('btn-mute');
  if (btnMute) btnMute.classList.toggle('active-btn', sonosState.muted);
  const btnSpeech = document.getElementById('btn-speech');
  if (btnSpeech) btnSpeech.classList.toggle('active-btn', sonosState.speech);
  const btnNight = document.getElementById('btn-night');
  if (btnNight) btnNight.classList.toggle('active-btn', sonosState.night);
}

async function sonosCmd(cmd) {
  try {
    if (cmd === 'volume_up') {
      sonosState.volume = Math.min(1.0, Math.round((sonosState.volume + 0.05) * 100) / 100);
      updateSonosUI();
      await post('api/sonos/command', { command: cmd, current: sonosState.volume });
    } else if (cmd === 'volume_down') {
      sonosState.volume = Math.max(0.0, Math.round((sonosState.volume - 0.05) * 100) / 100);
      updateSonosUI();
      await post('api/sonos/command', { command: cmd, current: sonosState.volume });
    } else if (cmd === 'mute') {
      const newMuted = !sonosState.muted;
      sonosState.muted = newMuted;
      updateSonosUI();
      await post('api/sonos/command', { command: cmd, muted: !newMuted }); // send OLD state so backend toggles
    } else if (cmd === 'speech_enhancement') {
      const newSpeech = !sonosState.speech;
      sonosState.speech = newSpeech;
      updateSonosUI();
      await post('api/sonos/command', { command: cmd, state: newSpeech }); // send NEW desired state
    } else if (cmd === 'night_mode') {
      const newNight = !sonosState.night;
      sonosState.night = newNight;
      updateSonosUI();
      await post('api/sonos/command', { command: cmd, state: newNight }); // send NEW desired state
    }
  } catch(e) { toast('Sonos error: ' + e.message, 'error'); }
}

// ── Keyboard ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── Mouse drag scroll for rows ───────────────────────────────────────────
function initDragScroll() {
  document.querySelectorAll('.row-scroll').forEach(row => {
    if (row._dragInit) return;
    row._dragInit = true;
    let isDown = false, startX, scrollLeft;
    row.addEventListener('mousedown', e => {
      isDown = true;
      startX = e.pageX - row.offsetLeft;
      scrollLeft = row.scrollLeft;
    });
    row.addEventListener('mouseleave', () => isDown = false);
    row.addEventListener('mouseup', () => isDown = false);
    row.addEventListener('mousemove', e => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - row.offsetLeft;
      row.scrollLeft = scrollLeft - (x - startX) * 1.5;
    });
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
if (!window.__tvGuideLoaded) {
  window.__tvGuideLoaded = true;
  loadShows();
  sonosLoadState();
}
