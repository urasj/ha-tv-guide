<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0e13; --panel:#151823; --panel2:#1d2130; --line:rgba(255,255,255,.07);
    --text:#eef0f6; --muted:#8b90a3; --teal:#2dd4bf; --violet:#8b7cf6; --accent:#2dd4bf;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:108px;overflow-x:hidden}
  h1,h2,h3,.brand,.big-title,.sh h2{font-family:'Space Grotesk',sans-serif}
  /* NAV */
  nav{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;padding:16px 30px 8px;background:linear-gradient(to bottom,rgba(12,14,19,.96),rgba(12,14,19,.6));backdrop-filter:blur(10px)}
  .brand{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700}
  .brand .b-dot{width:11px;height:11px;border-radius:50%;background:var(--teal);box-shadow:0 0 14px var(--teal)}
  .seg{display:flex;gap:4px;background:var(--panel);padding:4px;border-radius:12px;border:1px solid var(--line)}
  .seg button{padding:7px 14px;border-radius:9px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;background:none;border:none;font-family:'Inter'}
  .seg button.on{background:var(--panel2);color:#fff}
  .seg button:hover{color:#fff}
  .spacer{flex:1}
  .ico{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:#fff;font-size:16px;cursor:pointer}
  .ico:hover{background:var(--panel2)}
  /* FILTER CHIPS */
  .filters{display:flex;gap:8px;padding:6px 30px 4px;overflow-x:auto;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .fchip{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer}
  .fchip.on{border-color:var(--teal);color:#fff;background:rgba(45,212,191,.1)}
  .fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  /* SECTIONS */
  main{padding:8px 30px 0}
  .sh{display:flex;align-items:baseline;gap:10px;margin:24px 0 14px}
  .sh h2{font-size:19px;font-weight:600}
  .sh .ct{font-size:13px;color:var(--muted)}
  /* CONTINUE = landscape resume cards */
  .cw{display:grid;grid-auto-flow:column;grid-auto-columns:340px;gap:16px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;cursor:grab;user-select:none}
  .cw:active{cursor:grabbing}
  .cw::-webkit-scrollbar{display:none}
  .bcard{position:relative;height:194px;border-radius:18px;overflow:hidden;border:1px solid var(--line);cursor:pointer;display:flex;flex-direction:column;justify-content:flex-end;padding:18px;background-size:cover;background-position:center 25%}
  .bcard::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,rgba(8,9,13,.94) 0 40%,rgba(8,9,13,.25) 86%)}
  .bcard>*{position:relative;z-index:2}
  .bc-svc{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#fff;margin-bottom:auto}
  .bc-title{font-family:'Space Grotesk';font-size:24px;font-weight:600;line-height:1.02;max-width:90%}
  .bc-next{font-size:13px;color:var(--teal);font-weight:600;margin:6px 0 10px}
  .bc-prog{height:5px;background:rgba(255,255,255,.18);border-radius:3px;overflow:hidden;margin-bottom:12px;width:82%}
  .bc-prog>i{display:block;height:100%;background:var(--teal)}
  .bc-actions{display:flex;gap:8px;flex-wrap:wrap}
  .mini{padding:8px 14px;border-radius:10px;border:none;font-family:'Inter';font-size:13px;font-weight:600;cursor:pointer}
  .mini-p{background:var(--teal);color:#062b26}
  .mini-g{background:rgba(255,255,255,.13);color:#fff}
  .mini-g:hover{background:rgba(255,255,255,.22)}
  /* POSTER GRID */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(146px,1fr));gap:16px}
  .pcard{cursor:pointer}
  .pwrap{position:relative;aspect-ratio:2/3;border-radius:14px;overflow:hidden;border:1px solid var(--line);display:flex;align-items:flex-end;padding:12px;background:var(--panel2)}
  .pwrap>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .pwrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(8,9,13,.92),transparent 58%)}
  .pwrap b{position:relative;z-index:2;font-family:'Space Grotesk';font-size:16px;font-weight:600;line-height:1.08}
  .ptag{position:absolute;top:10px;left:10px;z-index:3;font-size:10px;font-weight:600;padding:4px 9px;border-radius:999px;background:rgba(8,9,13,.62);display:flex;align-items:center;gap:6px;color:#fff}
  .ring{position:absolute;top:8px;right:8px;z-index:3}
  .pnext{margin-top:9px;font-size:12px;color:var(--teal);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pmeta{margin-top:9px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between}
  /* EMPTY / SKELETON */
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px;color:var(--muted);text-align:center}
  .empty .ei{font-size:54px;opacity:.4}
  .empty h2{font-size:24px;color:var(--text)}
  .skرow{display:grid;grid-template-columns:repeat(auto-fill,minmax(146px,1fr));gap:16px}
  .skel{aspect-ratio:2/3;border-radius:14px;background:linear-gradient(90deg,var(--panel) 25%,var(--panel2) 50%,var(--panel) 75%);background-size:200% 100%;animation:sh 1.4s infinite}
  @keyframes sh{to{background-position:-200% 0}}
  /* MODAL */
  .modal-backdrop{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);display:flex;align-items:flex-start;justify-content:center;padding:36px 18px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s}
  .modal-backdrop.open{opacity:1;pointer-events:all}
  .modal{background:var(--panel);border-radius:18px;width:100%;max-width:840px;overflow:hidden;border:1px solid var(--line);transform:translateY(16px);transition:transform .25s}
  .modal-backdrop.open .modal{transform:none}
  .modal-hero{position:relative;height:300px;overflow:hidden}
  .modal-hero img{width:100%;height:100%;object-fit:cover;object-position:center 20%}
  .modal-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--panel),transparent 62%)}
  .modal-hero-info{position:absolute;bottom:22px;left:26px;right:26px;z-index:2;display:flex;align-items:flex-end;gap:18px}
  .modal-poster{width:78px;height:117px;border-radius:10px;object-fit:cover;flex-shrink:0}
  .modal-title{font-family:'Space Grotesk';font-size:32px;font-weight:600;line-height:1;margin-bottom:7px}
  .modal-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-bottom:10px}
  .modal-actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:11px;border:none;font-family:'Inter';font-size:14px;font-weight:600;cursor:pointer}
  .btn-primary{background:var(--teal);color:#062b26}
  .btn-ghost{background:rgba(255,255,255,.12);color:#fff}
  .btn-ghost:hover{background:rgba(255,255,255,.2)}
  .modal-close{position:absolute;top:14px;right:14px;z-index:3;width:34px;height:34px;background:rgba(0,0,0,.55);border:1px solid var(--line);border-radius:50%;color:#fff;font-size:17px;cursor:pointer}
  .modal-body{padding:22px 26px 26px}
  .modal-overview{font-size:14px;line-height:1.7;color:rgba(238,240,246,.78);margin-bottom:18px}
  .season-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .season-tab{padding:6px 14px;border-radius:10px;border:1px solid var(--line);background:none;color:var(--muted);font-family:'Inter';font-size:13px;cursor:pointer}
  .season-tab.active{background:var(--teal);border-color:var(--teal);color:#062b26;font-weight:600}
  .service-override{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
  .service-override-label{font-size:12px;color:var(--muted);margin-right:4px}
  .svc-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--line);background:none;color:var(--muted);font-family:'Inter';font-size:12px;font-weight:600;cursor:pointer}
  .svc-btn.active{background:var(--violet);border-color:var(--violet);color:#fff}
  .ep-list{display:flex;flex-direction:column;gap:2px}
  .ep-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px}
  .ep-row:hover{background:var(--panel2)}
  .ep-row.watched{opacity:.45}
  .ep-num{font-size:12px;color:var(--muted);font-weight:600;min-width:30px;text-align:right}
  .ep-info{flex:1;min-width:0}
  .ep-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ep-air{font-size:11px;color:var(--muted);margin-top:2px}
  .ep-tick{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);background:none;color:var(--muted);font-size:12px;cursor:pointer;flex-shrink:0}
  .ep-tick.on{background:var(--teal);border-color:var(--teal);color:#062b26}
  .ep-watch{padding:6px 12px;border-radius:8px;background:var(--teal);color:#062b26;border:none;font-family:'Inter';font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
  /* SCAN TOAST + TOASTS */
  .scan-modal{position:fixed;bottom:96px;right:24px;z-index:300;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 17px;font-size:13px;min-width:210px;transform:translateY(20px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:10px}
  .scan-modal.show{transform:none;opacity:1}
  .spin{animation:spin 1s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  #toast-container{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
  .toast{background:var(--panel2);border:1px solid var(--line);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;animation:ti .2s ease,to 0.3s ease 2.5s forwards}
  .toast.error{border-color:#e24b4a;color:#ff8f8f}
  @keyframes ti{from{opacity:0;transform:translateY(10px)}}
  @keyframes to{to{opacity:0;transform:translateY(-10px)}}
  /* OVERLAYS */
  .handoff-overlay,.prof-overlay{position:fixed;inset:0;z-index:450;background:rgba(8,9,13,.92);display:flex;align-items:center;justify-content:center;animation:fi .25s}
  @keyframes fi{from{opacity:0}}
  .handoff-box,.prof-box{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:30px 34px;text-align:center;max-width:460px;width:90%}
  .handoff-title,.prof-title{font-family:'Space Grotesk';font-size:24px;font-weight:600;margin-bottom:8px}
  .handoff-sub,.prof-app{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:22px}
  .handoff-remote{display:grid;grid-template-areas:". up ." "left ok right" ". down ." "back home .";gap:8px;justify-content:center;margin-bottom:22px}
  .hr-up{grid-area:up}.hr-down{grid-area:down}.hr-left{grid-area:left}.hr-right{grid-area:right}.hr-ok{grid-area:ok}.hr-back{grid-area:back}.hr-home{grid-area:home}
  .handoff-ready{width:100%;padding:13px;background:var(--teal);border:none;border-radius:12px;color:#062b26;font-family:'Space Grotesk';font-size:17px;font-weight:600;cursor:pointer;margin-bottom:10px}
  .handoff-ready:disabled{opacity:.6}
  .handoff-cancel,.prof-cancel{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer}
  .handoff-pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--teal);margin-right:6px;animation:pl 1.5s infinite}
  @keyframes pl{0%,100%{opacity:1}50%{opacity:.4}}
  .prof-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-bottom:18px}
  .prof-btn{width:86px;height:86px;border-radius:14px;border:2px solid var(--line);background:var(--panel2);color:#fff;cursor:pointer;font-family:'Inter';font-size:13px;font-weight:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
  .prof-btn:hover{border-color:var(--teal)}
  .prof-avatar{font-size:28px}
  /* DOCK */
  .dock{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:60;display:flex;align-items:center;gap:14px;background:rgba(21,24,35,.95);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:18px;padding:10px 16px;max-width:94vw;overflow-x:auto;scrollbar-width:none}
  .dock::-webkit-scrollbar{display:none}
  .dgrp{display:flex;align-items:center;gap:8px}
  .dlbl{font-family:'Space Grotesk';font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--muted)}
  .pad{display:grid;grid-template-columns:repeat(3,32px);grid-template-rows:repeat(3,32px);gap:3px;place-items:center}
  .pk{width:32px;height:32px;border-radius:9px;background:var(--panel2);color:#fff;border:none;font-size:14px;cursor:pointer}
  .pk:hover{background:#272b3b}
  .pk.c{background:var(--teal);color:#062b26;font-size:11px;font-weight:700;border-radius:50%}
  .db{width:40px;height:40px;border-radius:11px;background:var(--panel2);color:#fff;border:none;font-size:16px;cursor:pointer;flex-shrink:0}
  .db:hover{background:#272b3b}
  .db.on{background:var(--violet);color:#fff}
  .vbar{width:96px;height:6px;background:rgba(255,255,255,.16);border-radius:3px;overflow:hidden}
  .vbar>i{display:block;height:100%;width:42%;background:var(--violet)}
  .sep{width:1px;height:34px;background:var(--line);flex-shrink:0}
  @media(max-width:720px){
    nav{padding:14px 16px 6px;gap:10px}.seg{display:none}main{padding:8px 16px 0}.filters{padding:6px 16px}
    .cw{grid-auto-columns:282px}.pad{display:none}.dlbl{display:none}
  }
  /* ADD SHOW */
  .add-backdrop{position:fixed;inset:0;z-index:240;background:rgba(0,0,0,.8);display:flex;align-items:flex-start;justify-content:center;padding:48px 18px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s}
  .add-backdrop.open{opacity:1;pointer-events:all}
  .add-panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;width:100%;max-width:640px;overflow:hidden}
  .add-head{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
  .add-head h2{font-family:'Space Grotesk';font-size:20px;font-weight:600;flex:1}
  .add-search{margin:16px 20px 8px}
  .add-search input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;color:var(--text);font-family:'Inter';font-size:15px;outline:none}
  .add-search input:focus{border-color:var(--teal)}
  .add-results{padding:8px 12px 20px;max-height:60vh;overflow-y:auto}
  .ares{display:flex;gap:12px;padding:10px;border-radius:12px;align-items:center}
  .ares:hover{background:var(--panel2)}
  .ares img{width:46px;height:69px;border-radius:7px;object-fit:cover;background:var(--panel2);flex-shrink:0}
  .ares .ai{flex:1;min-width:0}
  .ares .at{font-size:15px;font-weight:600}
  .ares .am{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ares .ao{font-size:12px;color:var(--muted);margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .add-btn{padding:9px 15px;border-radius:10px;background:var(--teal);color:#062b26;border:none;font-family:'Inter';font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}
  .add-btn:disabled{opacity:.55;cursor:default}
  .in-lib{font-size:12px;color:var(--teal);flex-shrink:0;padding:8px 12px;font-weight:600}
  .add-hint{color:var(--muted);font-size:13px;text-align:center;padding:26px}
</style>
</head>
<body>
<nav>
  <div class="brand"><span class="b-dot"></span>TV Guide</div>
  <div class="seg">
    <button class="on">Home</button><button onclick="document.querySelector('#cw-sec')?.scrollIntoView({behavior:'smooth'})">Continue</button>
    <button onclick="document.querySelector('#lib-sec')?.scrollIntoView({behavior:'smooth'})">Library</button>
  </div>
  <div class="spacer"></div>
  <button class="ico" id="btn-scan-all" title="Scan services" onclick="scanAll()">⌕</button>
  <button class="ico" id="btn-add" title="Add a show" onclick="openAdd()" style="background:var(--teal);color:#062b26;width:auto;padding:0 14px;font-weight:700;font-family:'Inter'">＋ Add</button>
  <button class="ico" id="btn-refresh" title="Refresh" onclick="loadShows()">↻</button>
</nav>

<div class="filters" id="filter-row"></div>

<main id="main-content">
  <div class="sh"><h2>Loading…</h2></div>
  <div class="skрow">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div>
  </div>
</main>

<div class="dock">
  <div class="dgrp">
    <span class="dlbl">FIRE&nbsp;TV</span>
    <div class="pad">
      <span></span><button class="pk" onclick="remote('KEYCODE_DPAD_UP')">▲</button><span></span>
      <button class="pk" onclick="remote('KEYCODE_DPAD_LEFT')">◀</button><button class="pk c" onclick="remote('KEYCODE_DPAD_CENTER')">OK</button><button class="pk" onclick="remote('KEYCODE_DPAD_RIGHT')">▶</button>
      <span></span><button class="pk" onclick="remote('KEYCODE_DPAD_DOWN')">▼</button><span></span>
    </div>
    <button class="db" onclick="remote('KEYCODE_BACK')" title="Back">↩</button>
    <button class="db" onclick="remote('KEYCODE_HOME')" title="Home">⌂</button>
    <button class="db" onclick="remote('KEYCODE_MEDIA_PLAY_PAUSE')" title="Play/Pause">⏯</button>
  </div>
  <span class="sep"></span>
  <div class="dgrp">
    <span class="dlbl">SONOS</span>
    <button class="db" onclick="sonosCmd('volume_down')" title="Vol-">🔉</button>
    <div class="vbar"><i id="vol-bar"></i></div>
    <span id="vol-pct" style="font-size:12px;font-weight:600;min-width:34px">42%</span>
    <button class="db" onclick="sonosCmd('volume_up')" title="Vol+">🔊</button>
    <button class="db" id="btn-mute" onclick="sonosCmd('mute')" title="Mute">🔇</button>
    <button class="db" id="btn-speech" onclick="sonosCmd('speech_enhancement')" title="Speech enhancement" style="font-size:12px;font-weight:700">SE</button>
    <button class="db" id="btn-night" onclick="sonosCmd('night_mode')" title="Night sound">🌙</button>
  </div>
</div>

<div class="modal-backdrop" id="show-modal" onclick="maybeCloseModal(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-hero">
      <img id="modal-fanart" src="" alt="">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-hero-info">
        <img id="modal-poster" class="modal-poster" src="" alt="">
        <div style="flex:1">
          <div class="modal-title" id="modal-title"></div>
          <div class="modal-meta" id="modal-meta"></div>
          <div class="modal-actions" id="modal-actions"></div>
        </div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-overview" id="modal-overview"></div>
      <div class="service-override" id="service-override"></div>
      <div class="season-tabs" id="season-tabs"></div>
      <div class="ep-list" id="ep-list"></div>
    </div>
  </div>
</div>

<div class="scan-modal" id="scan-toast"><span class="spin">⟳</span><span id="scan-msg">Scanning…</span></div>
<div id="toast-container"></div>

<div class="add-backdrop" id="add-modal" onclick="maybeCloseAdd(event)">
  <div class="add-panel">
    <div class="add-head"><h2>Add a show</h2><button class="modal-close" style="position:static" onclick="closeAdd()">✕</button></div>
    <div class="add-search"><input id="add-input" type="text" placeholder="Search for a show to track…" autocomplete="off"></div>
    <div class="add-results" id="add-results"><div class="add-hint">Type a show name to search.</div></div>
  </div>
</div>

<script>
var COL={netflix:'#e50914',hulu:'#1ce783',disney:'#4a7bff',max:'#4d7cff',peacock:'#f7b500',discovery:'#3b9bff',prime:'#19b3e6',paramount:'#1f6bff',apple:'#d8d8d8',plex:'#e5a00d',tubi:'#fa3c00',pluto:'#ffd400',youtube:'#ff3a30'};
var SVCS={netflix:'Netflix',hulu:'Hulu',disney:'Disney+',max:'Max',peacock:'Peacock',discovery:'Discovery+',prime:'Prime Video',apple:'Apple TV+',paramount:'Paramount+',plex:'Plex',tubi:'Tubi',pluto:'Pluto TV',youtube:'YouTube'};

var appData={shows:[],watched:{},services:{},deep_links:{},profiles:{},nextup:{}};
var allShows=[];
var currentShowId=null,currentSeason=null,_profCb=null,_progressDirty=false,currentFilter='all';

async function api(method,path,body){
  const r=await fetch(path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  if(!r.ok) throw new Error(`${r.status}`);
  return r.json().catch(()=>({}));
}
const get=p=>api('GET',p), post=(p,b)=>api('POST',p,b), del=p=>api('DELETE',p);

function toast(msg,type=''){
  const el=document.createElement('div'); el.className='toast'+(type?' '+type:''); el.textContent=msg;
  document.getElementById('toast-container').appendChild(el); setTimeout(()=>el.remove(),3000);
}

async function loadShows(){
  const rb=document.getElementById('btn-refresh'); if(rb) rb.textContent='⟳';
  try{
    const [status,shows,data,nextup]=await Promise.all([
      get('api/status'), get('api/shows'),
      get('api/data').catch(()=>({watched:{}})), get('api/nextup').catch(()=>({}))
    ]);
    var showServices={},showDeepLinks={};
    shows.forEach(s=>{ if(s.service) showServices[String(s.id)]=s.service; if(s.deep_link) showDeepLinks[String(s.id)]=s.deep_link; });
    appData={watched:{},services:showServices,deep_links:showDeepLinks,profiles:{},...status,shows};
    appData.services=showServices; appData.deep_links=showDeepLinks;
    appData.watched=(data&&data.watched)?data.watched:{};
    appData.nextup=nextup||{};
    allShows=shows;
    render(); initDragScroll();
  }catch(e){ toast('Failed to load shows: '+e.message,'error'); console.error(e); }
  if(rb) rb.textContent='↻';
}

function getPoster(s){const i=(s.images||[]).find(x=>x.coverType==='poster');return i?.remoteUrl||i?.url||s.poster||null;}
function getFanart(s){const i=(s.images||[]).find(x=>x.coverType==='fanart')||(s.images||[]).find(x=>x.coverType==='banner');return i?.remoteUrl||i?.url||s.fanart||null;}
function getSvc(id){return appData.services?.[String(id)]||null;}
function nu(s){return appData.nextup?.[String(s.id)]||null;}
function getNextUp(s){return nu(s)?.next||null;}
function unwatchedCount(s){return nu(s)?.unwatched||0;}
function isStarted(s){return !!nu(s)?.started;}
function epLabel(e){return e?`S${e.season}·E${e.episode}`:'';}
function pct(s){const n=nu(s);return (n&&n.aired)?Math.round(n.watched/n.aired*100):0;}
function recomputeNextUp(show){
  const now=new Date();
  const eps=(show.episodes||[]).filter(e=>e.seasonNumber>0&&e.airDateUtc&&new Date(e.airDateUtc)<=now).sort((a,b)=>a.seasonNumber-b.seasonNumber||a.episodeNumber-b.episodeNumber);
  const w=new Set(appData.watched?.[show.id]||[]); let next=null,wc=0;
  for(const e of eps){ if(w.has(e.id)) wc++; else if(!next) next={id:e.id,season:e.seasonNumber,episode:e.episodeNumber,title:e.title,airDateUtc:e.airDateUtc,hasFile:e.hasFile}; }
  appData.nextup[String(show.id)]={next,aired:eps.length,watched:wc,unwatched:eps.length-wc,started:wc>0};
}
function filterShow(s){return currentFilter==='all'||getSvc(s.id)===currentFilter;}

function ringSvg(p){const r=15,c=2*Math.PI*r,off=c*(1-p/100);
  return `<svg class="ring" width="34" height="34" viewBox="0 0 34 34"><circle cx="17" cy="17" r="${r}" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="3"/><circle cx="17" cy="17" r="${r}" fill="none" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 17 17)"/></svg>`;}

function bigCard(s){
  const next=getNextUp(s), fan=getFanart(s)||getPoster(s), svc=getSvc(s.id);
  const bg=fan?`background-image:url('${fan}')`:`background:linear-gradient(120deg,#1d2130,#0b0c11)`;
  return `<div class="bcard" style="${bg}" onclick="openModal(${s.id})">
    <span class="bc-svc">${svc?`<span class="fdot" style="background:${COL[svc]||'#888'}"></span>${SVCS[svc]||svc}`:''}</span>
    <div class="bc-title">${s.title}</div>
    <div class="bc-next">▶ Resume ${epLabel(next)} · ${unwatchedCount(s)} to watch</div>
    <div class="bc-prog"><i style="width:${pct(s)}%"></i></div>
    <div class="bc-actions" onclick="event.stopPropagation()">
      ${svc?`<button class="mini mini-p" onclick="resumeShow(${s.id})">Resume</button>`:''}
      <button class="mini mini-g" onclick="openModal(${s.id})">Episodes</button>
      ${svc?`<button class="mini mini-g" onclick="launchShow(${s.id},'${svc}')">Open app</button>`:''}
    </div>
  </div>`;
}
function posterCard(s){
  const poster=getPoster(s), svc=getSvc(s.id), next=getNextUp(s), started=isStarted(s);
  return `<div class="pcard" onclick="openModal(${s.id})">
    <div class="pwrap">
      ${poster?`<img src="${poster}" loading="lazy" alt="">`:''}
      ${svc?`<span class="ptag"><span class="fdot" style="background:${COL[svc]||'#888'}"></span>${SVCS[svc]||svc}</span>`:''}
      ${started?ringSvg(pct(s)):''}
      <b>${s.title}</b>
    </div>
    ${next?`<div class="pnext">▶ Next ${epLabel(next)}</div>`:`<div class="pmeta"><span>${svc?SVCS[svc]:(s.network||'')}</span><span>${s.year||''}</span></div>`}
  </div>`;
}

function renderFilters(){
  const present=[...new Set(allShows.map(s=>getSvc(s.id)).filter(Boolean))];
  const row=document.getElementById('filter-row');
  row.innerHTML=`<div class="fchip${currentFilter==='all'?' on':''}" onclick="setFilter('all')">All</div>`+
    present.map(svc=>`<div class="fchip${currentFilter===svc?' on':''}" onclick="setFilter('${svc}')"><span class="fdot" style="background:${COL[svc]||'#888'}"></span>${SVCS[svc]||svc}</div>`).join('');
}
function setFilter(f){currentFilter=f; renderFilters(); render(); initDragScroll();}

function render(){
  const main=document.getElementById('main-content');
  if(!allShows.length){ main.innerHTML=`<div class="empty"><div class="ei">📺</div><h2>No shows yet</h2><div>Connect Sonarr to start tracking your shows.</div></div>`; return; }
  renderFilters();
  const cont=allShows.filter(s=>{const n=nu(s);return n&&n.next&&n.started&&filterShow(s);}).sort((a,b)=>new Date(getNextUp(b)?.airDateUtc||0)-new Date(getNextUp(a)?.airDateUtc||0));
  const fresh=allShows.filter(s=>{const n=nu(s);return n&&n.next&&!n.started&&filterShow(s);});
  const lib=allShows.filter(filterShow);
  let html='';
  if(cont.length) html+=`<div id="cw-sec"><div class="sh"><h2>Continue watching</h2><span class="ct">where you left off</span></div><div class="cw" id="cw">${cont.map(bigCard).join('')}</div></div>`;
  if(fresh.length) html+=`<div class="sh"><h2>Ready to start</h2><span class="ct">${fresh.length} ${fresh.length===1?'show':'shows'}</span></div><div class="grid">${fresh.map(posterCard).join('')}</div>`;
  html+=`<div id="lib-sec"><div class="sh"><h2>Your library</h2><span class="ct">${lib.length} ${lib.length===1?'show':'shows'}</span></div><div class="grid">${lib.map(posterCard).join('')}</div></div>`;
  main.innerHTML=html;
}

async function openModal(showId){
  currentShowId=showId; const show=allShows.find(s=>s.id===showId); if(!show) return;
  document.getElementById('show-modal').classList.add('open'); document.body.style.overflow='hidden';
  const fan=getFanart(show),poster=getPoster(show),svc=getSvc(showId);
  document.getElementById('modal-fanart').src=fan||poster||'';
  const mp=document.getElementById('modal-poster'); mp.src=poster||''; mp.style.display=poster?'block':'none';
  document.getElementById('modal-title').textContent=show.title;
  document.getElementById('modal-overview').textContent=show.overview||'';
  const seasons=show.seasonCount?`${show.seasonCount} season${show.seasonCount>1?'s':''}`:'';
  const epc=show.episodeCount?`${show.episodeCount} episodes`:'';
  document.getElementById('modal-meta').innerHTML=[show.network,show.year,show.status,seasons,epc,(show.genres||[]).slice(0,3).join(', ')].filter(Boolean).map(m=>`<span>${m}</span>`).join('');
  const next=getNextUp(show); const actions=document.getElementById('modal-actions');
  if(svc){ actions.innerHTML=(next?`<button class="btn btn-primary" onclick="resumeShow(${showId})">▶ Resume ${epLabel(next)}</button>`:'')+`<button class="btn btn-ghost" onclick="launchShow(${showId},'${svc}')">📺 Open ${SVCS[svc]||svc}</button><button class="btn btn-ghost" onclick="scanShow(${showId})">🔍 Scan</button>`; }
  else { actions.innerHTML=`<button class="btn btn-ghost" onclick="scanShow(${showId})">🔍 Find streaming service</button>`; }
  renderServiceButtons(showId);
  try{ const eps=await get(`api/shows/${showId}/episodes`); show.episodes=eps; renderSeasons(show); }
  catch{ document.getElementById('ep-list').innerHTML='<div style="color:var(--muted);font-size:13px;padding:10px 0">No episode data available</div>'; }
}
function renderServiceButtons(showId){
  const svc=getSvc(showId); const o=document.getElementById('service-override');
  o.innerHTML=`<span class="service-override-label">Service:</span>`+Object.entries(SVCS).map(([k,v])=>`<button class="svc-btn${svc===k?' active':''}" onclick="setService(${showId},'${k}',this)">${v}</button>`).join('')+(svc?`<button class="svc-btn" onclick="setService(${showId},'',this)">✕ Clear</button>`:'');
}
function renderSeasons(show){
  const eps=show.episodes||[]; const seasons=[...new Set(eps.map(e=>e.seasonNumber))].filter(s=>s>0).sort((a,b)=>a-b);
  if(!seasons.length){ document.getElementById('season-tabs').innerHTML=''; document.getElementById('ep-list').innerHTML='<div style="color:var(--muted);font-size:13px;padding:10px 0">No episodes found</div>'; return; }
  if(!currentSeason||!seasons.includes(currentSeason)) currentSeason=seasons[seasons.length-1];
  document.getElementById('season-tabs').innerHTML=seasons.map(s=>`<button class="season-tab${s===currentSeason?' active':''}" onclick="selectSeason(${show.id},${s})">Season ${s}</button>`).join('');
  renderEpisodes(show,currentSeason);
}
function selectSeason(showId,season){ currentSeason=season; const show=allShows.find(s=>s.id===showId);
  document.querySelectorAll('.season-tab').forEach(t=>t.classList.toggle('active',t.textContent.trim()===`Season ${season}`)); renderEpisodes(show,season); }
function renderEpisodes(show,season){
  const eps=(show.episodes||[]).filter(e=>e.seasonNumber===season).sort((a,b)=>a.episodeNumber-b.episodeNumber);
  const watched=appData.watched?.[show.id]||[]; const svc=getSvc(show.id); const list=document.getElementById('ep-list');
  if(!eps.length){ list.innerHTML='<div style="color:var(--muted);font-size:13px;padding:10px 0">No episodes in this season</div>'; return; }
  list.innerHTML=eps.map(ep=>{
    const w=watched.includes(ep.id); const air=ep.airDateUtc?new Date(ep.airDateUtc).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'TBA';
    const fired=ep.airDateUtc&&new Date(ep.airDateUtc)<=new Date();
    return `<div class="ep-row${w?' watched':''}" id="ep-${ep.id}"><div class="ep-num">${ep.episodeNumber}</div><div class="ep-info"><div class="ep-name">${ep.title||`Episode ${ep.episodeNumber}`}</div><div class="ep-air">${air}</div></div>${fired?`<button class="ep-tick${w?' on':''}" onclick="toggleWatched(${show.id},${ep.id},${w})">✓</button>`:''}${svc&&fired?`<button class="ep-watch" onclick="launchShow(${show.id},'${svc}',${ep.id})">▶ Watch</button>`:''}</div>`;
  }).join('');
}
function closeModal(){ document.getElementById('show-modal').classList.remove('open'); document.body.style.overflow=''; currentShowId=null; currentSeason=null; if(_progressDirty){_progressDirty=false; render(); initDragScroll();} }
function maybeCloseModal(e){ if(e.target===document.getElementById('show-modal')) closeModal(); }

async function setService(showId,svc,btn){
  try{
    await post(`api/shows/${showId}/service`,{service:svc});
    if(!appData.services) appData.services={}; appData.services[String(showId)]=svc||null;
    var o=allShows.find(s=>s.id===showId); if(o) o.service=svc||null;
    renderServiceButtons(showId);
    const next=getNextUp(allShows.find(s=>s.id===showId)); const actions=document.getElementById('modal-actions');
    actions.innerHTML=svc?((next?`<button class="btn btn-primary" onclick="resumeShow(${showId})">▶ Resume ${epLabel(next)}</button>`:'')+`<button class="btn btn-ghost" onclick="launchShow(${showId},'${svc}')">📺 Open ${SVCS[svc]||svc}</button><button class="btn btn-ghost" onclick="scanShow(${showId})">🔍 Scan</button>`):`<button class="btn btn-ghost" onclick="scanShow(${showId})">🔍 Find streaming service</button>`;
    toast(`Service set to ${SVCS[svc]||svc||'none'}`);
    if(svc){ const s2=allShows.find(s=>s.id===showId); if(s2?.tvdbId){ if(appData.deep_links) delete appData.deep_links[String(showId)]; s2.deep_link=null; scanShow(showId,svc); } }
  }catch(e){ toast('Failed to set service','error'); }
}
async function toggleWatched(sid,epId,isW){
  if(isW){ appData.watched[sid]=(appData.watched[sid]||[]).filter(e=>e!==epId); await del(`api/shows/${sid}/watched/${epId}`); }
  else{ if(!appData.watched[sid]) appData.watched[sid]=[]; appData.watched[sid].push(epId); await post(`api/shows/${sid}/watched/${epId}`,{}); }
  const row=document.getElementById(`ep-${epId}`); if(row){ row.classList.toggle('watched',!isW); const b=row.querySelector('.ep-tick'); if(b){ b.classList.toggle('on',!isW); } }
  const o=allShows.find(s=>s.id===sid); if(o) recomputeNextUp(o); _progressDirty=true;
}
function resumeShow(showId){ const svc=getSvc(showId); if(!svc){ openModal(showId); toast('Pick a streaming service first','error'); return; } launchShow(showId,svc); }
async function launchShow(sid,svc,epId){
  toast(`Launching ${SVCS[svc]||svc}…`);
  try{ await post('api/firetv/launch',{service:svc,profileIndex:-1,showId:sid}); }catch(e){ toast('Launch failed: '+e.message,'error'); return; }
  showHandoffOverlay(svc,sid);
}
function showHandoffOverlay(svc,showId){
  const n=SVCS[svc]||svc; const el=document.createElement('div'); el.className='handoff-overlay'; el.id='handoff-overlay';
  el.innerHTML=`<div class="handoff-box"><div class="handoff-title">${n} is opening</div><div class="handoff-sub"><span class="handoff-pulse"></span>Pick your profile and enter any PIN, then click ready when you see the home screen.</div><div class="handoff-remote"><button class="db hr-up" onclick="remote('KEYCODE_DPAD_UP')">▲</button><button class="db hr-left" onclick="remote('KEYCODE_DPAD_LEFT')">◀</button><button class="db hr-ok" onclick="remote('KEYCODE_DPAD_CENTER')">OK</button><button class="db hr-right" onclick="remote('KEYCODE_DPAD_RIGHT')">▶</button><button class="db hr-down" onclick="remote('KEYCODE_DPAD_DOWN')">▼</button><button class="db hr-back" onclick="remote('KEYCODE_BACK')">↩</button><button class="db hr-home" onclick="remote('KEYCODE_HOME')">⌂</button></div><button class="handoff-ready" onclick="handoffReady('${svc}',${showId})">✓ I'm ready — go to show</button><button class="handoff-cancel" onclick="document.getElementById('handoff-overlay').remove()">Cancel</button></div>`;
  document.body.appendChild(el);
}
async function handoffReady(svc,showId){
  const ov=document.getElementById('handoff-overlay');
  if(ov){ const b=ov.querySelector('.handoff-ready'); b.textContent='⟳ Navigating…'; b.disabled=true; }
  try{ await post('api/firetv/deeplink',{service:svc,showId}); toast(`Opening show on ${SVCS[svc]||svc}`); }
  catch(e){ toast('Navigation failed: '+e.message,'error'); }
  if(ov) ov.remove(); closeModal();
}
function showProfilePicker(svc,onSelect){
  _profCb=onSelect; const profiles=appData.profiles?.[svc]||[]; const av=['🧑','👧','🧔','👩','👦','🧓'];
  const el=document.createElement('div'); el.className='prof-overlay'; el.id='prof-overlay';
  el.innerHTML=`<div class="prof-box"><div class="prof-title">Who's watching?</div><div class="prof-app">${SVCS[svc]||svc}</div><div class="prof-grid">${profiles.map((p,i)=>`<button class="prof-btn" onclick="selectProfile(${i})"><span class="prof-avatar">${av[i%av.length]}</span><span>${p}</span></button>`).join('')}</div><button class="prof-cancel" onclick="document.getElementById('prof-overlay').remove()">Cancel</button></div>`;
  document.body.appendChild(el);
}
function selectProfile(i){ document.getElementById('prof-overlay')?.remove(); if(_profCb){ _profCb(i); _profCb=null; } }

async function scanShow(showId,forceSvc){
  const st=document.getElementById('scan-toast'); const show=allShows.find(s=>s.id===showId);
  document.getElementById('scan-msg').textContent=`Getting link for ${show?.title||'show'}…`; st.classList.add('show');
  try{
    const tvdbId=show?.tvdbId; const title=encodeURIComponent(show?.title||'');
    if(!tvdbId){ toast('No TVDB ID for this show','error'); st.classList.remove('show'); return; }
    const res=await get(`api/shows/${showId}/scan-service?tvdb_id=${tvdbId}&title=${title}`);
    const svcToUse=forceSvc||res.service;
    if(svcToUse){
      if(!appData.services) appData.services={};
      if(!forceSvc){ appData.services[String(showId)]=svcToUse; var o2=allShows.find(s=>s.id===showId); if(o2) o2.service=svcToUse; }
      var deepLink=res.deep_link;
      if(forceSvc&&res.service!==forceSvc){
        const sl={netflix:`https://www.netflix.com/search?q=${title}`,hulu:`https://www.hulu.com/search?q=${title}`,disney:`https://www.disneyplus.com/search/${title}`,max:`https://play.max.com/search/result?q=${title}`,peacock:`https://www.peacocktv.com/search?q=${title}`,discovery:`https://play.discoveryplus.com/show/${title.toLowerCase().replace(/%20/g,'-')}`,prime:`https://www.amazon.com/s?k=${title}&i=prime-instant-video`,paramount:`https://www.paramountplus.com/shows/${title.toLowerCase().replace(/%20/g,'-')}/`,apple:`https://tv.apple.com/search?term=${title}`};
        deepLink=sl[forceSvc]||null; if(deepLink) await post(`api/shows/${showId}/service`,{service:forceSvc,deep_link:deepLink});
      }
      if(deepLink){ if(!appData.deep_links) appData.deep_links={}; appData.deep_links[String(showId)]=deepLink; var o3=allShows.find(s=>s.id===showId); if(o3) o3.deep_link=deepLink; }
      const disp=forceSvc||svcToUse;
      toast(`✓ ${forceSvc?'Link ready for':'Found on'} ${SVCS[disp]||disp}`);
      if(currentShowId===showId){ renderServiceButtons(showId); const next=getNextUp(allShows.find(s=>s.id===showId)); document.getElementById('modal-actions').innerHTML=(next?`<button class="btn btn-primary" onclick="resumeShow(${showId})">▶ Resume ${epLabel(next)}</button>`:'')+`<button class="btn btn-ghost" onclick="launchShow(${showId},'${disp}')">📺 Open ${SVCS[disp]||disp}</button><button class="btn btn-ghost" onclick="scanShow(${showId})">🔍 Scan</button>`; }
    } else { toast('Not found on any streaming service','error'); }
  }catch(e){ toast('Scan failed: '+e.message,'error'); }
  st.classList.remove('show');
}
async function scanAll(){
  const btn=document.getElementById('btn-scan-all'); btn.disabled=true;
  const st=document.getElementById('scan-toast'); document.getElementById('scan-msg').textContent='Refreshing shows…'; st.classList.add('show');
  try{
    const fresh=await get('api/shows'); allShows=fresh;
    document.getElementById('scan-msg').textContent=`Scanning ${fresh.length} shows…`;
    const res=await post('api/scan-all',{shows:fresh.map(s=>({id:s.id,tvdbId:s.tvdbId,title:s.title}))});
    if(res.results) Object.assign(appData.services,res.results);
    toast(`✓ Found service for ${res.found||0} of ${res.scanned||0} shows`);
    await loadShows();
  }catch(e){ toast('Scan failed: '+e.message,'error'); }
  st.classList.remove('show'); btn.disabled=false;
}

async function remote(key){ try{ await post('api/firetv/command',{command:key}); }catch(e){ toast('Remote error','error'); } }

var sonosState={volume:.42,muted:false,speech:false,night:false};
async function sonosLoadState(){ try{ const s=await get('api/sonos/state'); sonosState={volume:s.volume||0,muted:s.muted||false,speech:s.speech_enhancement||false,night:s.night_mode||false}; updateSonosUI(); }catch(e){} }
function updateSonosUI(){
  const p=Math.round(sonosState.volume*100);
  const bar=document.getElementById('vol-bar'); if(bar) bar.style.width=p+'%';
  const pe=document.getElementById('vol-pct'); if(pe) pe.textContent=p+'%';
  const m=document.getElementById('btn-mute'); if(m) m.classList.toggle('on',sonosState.muted);
  const se=document.getElementById('btn-speech'); if(se) se.classList.toggle('on',sonosState.speech);
  const ni=document.getElementById('btn-night'); if(ni) ni.classList.toggle('on',sonosState.night);
}
async function sonosCmd(cmd){
  try{
    if(cmd==='volume_up'){ sonosState.volume=Math.min(1,Math.round((sonosState.volume+.05)*100)/100); updateSonosUI(); await post('api/sonos/command',{command:cmd,current:sonosState.volume}); }
    else if(cmd==='volume_down'){ sonosState.volume=Math.max(0,Math.round((sonosState.volume-.05)*100)/100); updateSonosUI(); await post('api/sonos/command',{command:cmd,current:sonosState.volume}); }
    else if(cmd==='mute'){ const nm=!sonosState.muted; sonosState.muted=nm; updateSonosUI(); await post('api/sonos/command',{command:cmd,muted:!nm}); }
    else if(cmd==='speech_enhancement'){ const ns=!sonosState.speech; sonosState.speech=ns; updateSonosUI(); await post('api/sonos/command',{command:cmd,state:ns}); }
    else if(cmd==='night_mode'){ const nn=!sonosState.night; sonosState.night=nn; updateSonosUI(); await post('api/sonos/command',{command:cmd,state:nn}); }
  }catch(e){ toast('Sonos error: '+e.message,'error'); }
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
function initDragScroll(){
  document.querySelectorAll('.cw').forEach(row=>{
    if(row._d) return; row._d=true; let down=false,sx,sl;
    row.addEventListener('mousedown',e=>{down=true;sx=e.pageX-row.offsetLeft;sl=row.scrollLeft;});
    row.addEventListener('mouseleave',()=>down=false); row.addEventListener('mouseup',()=>down=false);
    row.addEventListener('mousemove',e=>{ if(!down) return; e.preventDefault(); row.scrollLeft=sl-((e.pageX-row.offsetLeft)-sx)*1.5; });
  });
}
var _addTimer=null;
function openAdd(){ document.getElementById('add-modal').classList.add('open'); document.body.style.overflow='hidden'; const i=document.getElementById('add-input'); i.value=''; document.getElementById('add-results').innerHTML='<div class="add-hint">Type a show name to search.</div>'; setTimeout(()=>i.focus(),60); }
function closeAdd(){ document.getElementById('add-modal').classList.remove('open'); document.body.style.overflow=''; }
function maybeCloseAdd(e){ if(e.target===document.getElementById('add-modal')) closeAdd(); }
document.addEventListener('input',e=>{ if(e.target&&e.target.id==='add-input'){ clearTimeout(_addTimer); const term=e.target.value.trim(); if(term.length<2){ document.getElementById('add-results').innerHTML='<div class="add-hint">Type at least 2 characters.</div>'; return; } _addTimer=setTimeout(()=>doAddSearch(term),350); } });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeAdd(); });
async function doAddSearch(term){
  const box=document.getElementById('add-results'); box.innerHTML='<div class="add-hint">Searching…</div>';
  try{
    const res=await get('api/search?term='+encodeURIComponent(term));
    if(!res.length){ box.innerHTML='<div class="add-hint">No matches found.</div>'; return; }
    box.innerHTML=res.map(r=>`<div class="ares">
      <img src="${r.poster||''}" alt="" onerror="this.style.visibility='hidden'">
      <div class="ai"><div class="at">${r.title} ${r.year?`<span style="color:var(--muted);font-weight:400">(${r.year})</span>`:''}</div>
      <div class="am">${[r.network,r.status].filter(Boolean).join(' · ')}</div>
      <div class="ao">${r.overview||''}</div></div>
      ${r.added?`<span class="in-lib">✓ In library</span>`:`<button class="add-btn" onclick="addShow(${r.tvdbId},this)">＋ Add</button>`}
    </div>`).join('');
  }catch(e){ box.innerHTML='<div class="add-hint">Search failed: '+e.message+'</div>'; }
}
async function addShow(tvdbId,btn){
  btn.disabled=true; btn.textContent='Adding…';
  try{
    const r=await post('api/add',{tvdbId:tvdbId,monitor:'all',search:false});
    btn.textContent='✓ Added'; toast('Added '+(r.title||'show')+' to your library');
    loadShows();
  }catch(e){ btn.disabled=false; btn.textContent='＋ Add'; toast('Add failed: '+e.message,'error'); }
}
if(!window.__tvg){ window.__tvg=true; loadShows(); sonosLoadState(); }
</script>
